{% extends 'masters/base.html' %}

{% block title %}Добавить выходной день{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle me-2" style="color: #ff85b3;"></i>Добавить выходной день</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="date" class="form-label">Дата</label>
                        <input type="date" class="form-control" id="date" name="date" 
                               min="{{ now|date:'Y-m-d' }}" required>
                        <small class="text-muted">Выберите дату, когда не работаете</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="reason" class="form-label">Причина (необязательно)</label>
                        <input type="text" class="form-control" id="reason" name="reason" 
                               placeholder="Например: Отпуск, больничный, праздник">
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-pink">Сохранить</button>
                        <a href="{% url 'days_off' %}" class="btn btn-outline-pink ms-2">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

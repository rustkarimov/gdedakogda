{% extends 'masters/base.html' %}

{% block title %}Вход - Где Да Когда{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2" style="color: #ff85b3;"></i>Вход в кабинет</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Номер телефона</label>
                        <input type="tel" name="username" id="id_username" class="form-control" 
                               placeholder="+7 (999) 123-45-67" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100">Войти</button>
                </form>
                
                <div class="mt-3 text-center">
                    <p class="mb-0">Нет аккаунта? <a href="{% url 'register' %}" style="color: #ff85b3;">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

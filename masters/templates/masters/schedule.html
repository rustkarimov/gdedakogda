<!-- Модальное окно для добавления/редактирования -->
<div class="modal fade" id="scheduleModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Добавить рабочий день</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="scheduleForm">
                    {% csrf_token %}
                    <input type="hidden" id="scheduleId" name="schedule_id">
                    
                    <div class="mb-3">
                        <label class="form-label">День недели</label>
                        <select class="form-select" id="dayOfWeek" required>
                            <option value="">Выберите день</option>
                            <option value="0">Понедельник</option>
                            <option value="1">Вторник</option>
                            <option value="2">Среда</option>
                            <option value="3">Четверг</option>
                            <option value="4">Пятница</option>
                            <option value="5">Суббота</option>
                            <option value="6">Воскресенье</option>
                        </select>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Начало работы</label>
                            <input type="time" class="form-control" id="startTime" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Конец работы</label>
                            <input type="time" class="form-control" id="endTime" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Перерывы</label>
                        <div id="breaksContainer">
                            <div class="break-item row mb-2">
                                <div class="col-md-5">
                                    <input type="time" class="form-control break-start" placeholder="Начало">
                                </div>
                                <div class="col-md-5">
                                    <input type="time" class="form-control break-end" placeholder="Конец">
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-danger btn-sm remove-break" style="display: none;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-pink mt-2" onclick="addBreakField()">
                            <i class="fas fa-plus me-1"></i>Добавить перерыв
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-pink" onclick="saveSchedule()">Сохранить</button>
            </div>
        </div>
    </div>
</div>


<!-- Дополнительные рабочие дни -->
<div class="card mt-4">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">

    </div>

            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для дополнительных рабочих дней -->

    <div class="modal-dialog modal-lg">
        <div class="modal-content">

                    <div class="row mb-3">

                            <label class="form-label">Начало работы</label>
                            <input type="time" class="form-control" id="extraDayStart" required>

                        <div class="col-md-6">
                            <label class="form-label">Конец работы</label>
                            <input type="time" class="form-control" id="extraDayEnd" required>

                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Перерывы</label>
                        <div id="extraDayBreaksContainer">
                            <div class="break-item row mb-2">
                                <div class="col-md-5">
                                    <input type="time" class="form-control break-start" placeholder="Начало">
                                </div>
                                <div class="col-md-5">
                                    <input type="time" class="form-control break-end" placeholder="Конец">
                                </div>
                                <div class="col-md-2">
                                    <button type="button" class="btn btn-danger btn-sm remove-break" style="display: none;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm btn-outline-pink mt-2" onclick="addExtraDayBreakField()">
                            <i class="fas fa-plus me-1"></i>Добавить перерыв

                </form>

            <div class="modal-footer">

<script>
    // Загрузка дополнительных рабочих дней
function loadExtraDays() {
    fetch('/api/extra-days/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('extra-days-container');
            if (data.extra_days && data.extra_days.length > 0) {
                const today = new Date().toISOString().split('T')[0];
                const futureDays = data.extra_days.filter(d => d.date >= today);
                const pastDays = data.extra_days.filter(d => d.date < today);
                
                let html = '';
                
                if (futureDays.length > 0) {
                    html += '<h6 class="mb-3">Предстоящие:</h6>';
                    html += '<div class="table-responsive mb-4">';
                    html += '<table class="table table-sm">';
                    html += '<thead><tr><th>Дата</th><th>Время</th><th>Перерывы</th><th>Действия</th></tr></thead><tbody>';
                    futureDays.forEach(day => {
                        html += `
                            <tr>
                                <td>${day.date_display} (${day.weekday})</td>
                                <td>${day.start_time} - ${day.end_time}</td>
                                <td>${day.breaks.map(b => `${b.start}-${b.end}`).join(', ') || '—'}</td>
                                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteExtraDay(${day.id})"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `;
                    });
                    html += '</tbody></table></div>';
                }
                
                if (pastDays.length > 0) {
                    html += '<details class="mt-3"><summary class="text-muted">Прошедшие (${pastDays.length})</summary>';
                    html += '<div class="table-responsive mt-2"><table class="table table-sm table-borderless">';
                    html += '<thead><tr><th>Дата</th><th>Время</th></tr></thead><tbody>';
                    pastDays.forEach(day => {
                        html += `<tr><td>${day.date_display}</td><td>${day.start_time} - ${day.end_time}</td></tr>`;
                    });
                    html += '</tbody></table></div></details>';
                }
                
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-muted mb-0">Нет дополнительных рабочих дней</p>';
            }
        });
}

function openAddExtraDayModal() {
    document.getElementById('extraDayForm').reset();
    // Сбрасываем перерывы
    const container = document.getElementById('extraDayBreaksContainer');
    container.innerHTML = `
        <div class="break-item row mb-2">
            <div class="col-md-5">
                <input type="time" class="form-control break-start" placeholder="Начало">
            </div>
            <div class="col-md-5">
                <input type="time" class="form-control break-end" placeholder="Конец">
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-danger btn-sm remove-break" style="display: none;">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    `;
    // Устанавливаем минимальную дату = сегодня
    document.getElementById('extraDayDate').min = new Date().toISOString().split('T')[0];
}

function addExtraDayBreakField(start = '', end = '') {
    const container = document.getElementById('extraDayBreaksContainer');
    const breakDiv = document.createElement('div');
    breakDiv.className = 'break-item row mb-2';
    breakDiv.innerHTML = `
        <div class="col-md-5">
            <input type="time" class="form-control break-start" value="${start}" placeholder="Начало">
        </div>
        <div class="col-md-5">
            <input type="time" class="form-control break-end" value="${end}" placeholder="Конец">
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger btn-sm remove-break" onclick="this.closest('.break-item').remove()">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    `;
    container.appendChild(breakDiv);
}

function saveExtraDay() {
    const date = document.getElementById('extraDayDate').value;
    const startTime = document.getElementById('extraDayStart').value;
    const endTime = document.getElementById('extraDayEnd').value;
    
    if (!date || !startTime || !endTime) {
        alert('Заполните все обязательные поля');
        return;
    }
    
    // Собираем перерывы
    const breaks = [];
    document.querySelectorAll('#extraDayBreaksContainer .break-item').forEach(item => {
        const start = item.querySelector('.break-start').value;
        const end = item.querySelector('.break-end').value;
        if (start && end) {
            breaks.push({ start, end });
        }
    });
    
    fetch('/api/extra-days/add/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({
            date: date,
            start_time: startTime,
            end_time: endTime,
            breaks: breaks
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('extraDayModal')).hide();
            loadExtraDays();
            // Также обновляем календарь на дашборде, если открыт
            if (typeof loadCalendar === 'function') loadCalendar();
        } else {
            alert(data.error || 'Ошибка при сохранении');
        }
    });
}

function deleteExtraDay(id) {
    if (confirm('Удалить этот дополнительный рабочий день?')) {
        fetch(`/api/extra-days/${id}/delete/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadExtraDays();
                if (typeof loadCalendar === 'function') loadCalendar();
            } else {
                alert(data.error || 'Ошибка при удалении');
            }
        });
    }
}

// Загружаем дополнительные дни при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    loadExtraDays();
});
</script>


<script>
    // Загрузка выходных дней
function loadDaysOff() {
    fetch('/api/days-off/list/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('days-off-container');
            if (!container) return;
            
            if (data.days_off && data.days_off.length > 0) {
                const today = new Date().toISOString().split('T')[0];
                const futureDays = data.days_off.filter(d => d.date >= today);
                const pastDays = data.days_off.filter(d => d.date < today);
                
                let html = '';
                
                if (futureDays.length > 0) {
                    html += '<div class="table-responsive mb-3">';
                    html += '<table class="table table-sm">';
                    html += '<thead><tr><th>Дата</th><th>День недели</th><th>Причина</th><th>Действия</th></tr></thead><tbody>';
                    futureDays.forEach(day => {
                        const dateObj = new Date(day.date);
                        const weekday = dateObj.toLocaleDateString('ru-RU', { weekday: 'long' });
                        html += `
                            <tr>
                                <td>${day.date}</td>
                                <td>${weekday}</td>
                                <td>${day.reason || '—'}</td>
                                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteDayOff(${day.id})"><i class="fas fa-trash"></i></button></td>
                            </tr>
                        `;
                    });
                    html += '</tbody></table></div>';
                }
                
                if (pastDays.length > 0) {
                    html += '<details class="mt-2"><summary class="text-muted">Прошедшие (' + pastDays.length + ')</summary>';
                    html += '<div class="table-responsive mt-2"><table class="table table-sm table-borderless">';
                    html += '<thead><tr><th>Дата</th><th>Причина</th></tr></thead><tbody>';
                    pastDays.forEach(day => {
                        html += `<tr><td>${day.date}</td><td>${day.reason || '—'}</td></tr>`;
                    });
                    html += '</tbody></table></div></details>';
                }
                
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-muted mb-0">Нет выходных дней</p>';
            }
        })
        .catch(error => {
            console.error('Ошибка загрузки выходных:', error);
            const container = document.getElementById('days-off-container');
            if (container) container.innerHTML = '<p class="text-danger">Ошибка загрузки</p>';
        });
}

function openAddDayOffModal() {
    document.getElementById('dayOffForm').reset();
    document.getElementById('dayOffDate').min = new Date().toISOString().split('T')[0];
}

function saveDayOff() {
    const date = document.getElementById('dayOffDate').value;
    const reason = document.getElementById('dayOffReason').value;
    
    if (!date) {
        alert('Выберите дату');
        return;
    }
    
    fetch('/api/days-off/add/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify({ date: date, reason: reason })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('dayOffModal')).hide();
            loadDaysOff();
            if (typeof loadCalendar === 'function') loadCalendar();
        } else {
            alert(data.error || 'Ошибка при сохранении');
        }
    });
}

function deleteDayOff(id) {
    if (confirm('Удалить этот выходной день?')) {
        fetch(`/api/days-off/${id}/delete/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadDaysOff();
                if (typeof loadCalendar === 'function') loadCalendar();
            } else {
                alert(data.error || 'Ошибка при удалении');
            }
        });
    }
}

// Загружаем при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    loadExtraDays();
    loadDaysOff();
});
</script>

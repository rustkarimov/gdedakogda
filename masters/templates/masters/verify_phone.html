{% extends 'masters/base.html' %}

{% block title %}Подтверждение телефона{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-key me-2" style="color: #ff85b3;"></i>Код подтверждения</h4>
            </div>
            <div class="card-body">
                <p class="text-center mb-3">
                    На номер <strong>{{ phone }}</strong> отправлен код подтверждения
                </p>
                
                <div class="alert alert-info text-center">
                    <strong>🧪 ТЕСТОВЫЙ РЕЖИМ:</strong><br>
                    Ваш код: <strong class="h4">{{ test_code }}</strong>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label for="id_code" class="form-label">Код из 6 цифр</label>
                        <input type="text" name="code" id="id_code" class="form-control form-control-lg text-center" 
                               placeholder="000000" maxlength="6" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100">Подтвердить</button>
                </form>
                
                <div class="mt-3 text-center">
                    <a href="{% url 'resend_code' %}" style="color: #ff85b3;">Отправить код повторно</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% if days_off %}
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr>
                    <th>Дата</th>
                    <th>Причина</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for day in days_off %}
                <tr id="day-off-row-{{ day.id }}">
                    <td data-label="date"><strong>{{ day.date|date:"d.m.Y" }}</strong></td>
                    <td data-label="reason">{{ day.reason|default:"—" }}</td>
                    <td data-label="actions">
                        <div class="action-icons">
                            <button class="btn btn-sm" onclick="deleteDayOff({{ day.id }})" title="Удалить">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <p class="text-muted mb-0">Нет предстоящих выходных</p>
{% endif %}

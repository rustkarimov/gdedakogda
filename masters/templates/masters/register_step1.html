{% extends 'masters/base.html' %}

{% block title %}Регистрация - Шаг 1{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-user-plus me-2" style="color: #ff85b3;"></i>Регистрация мастера</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_phone" class="form-label">Номер телефона <span class="text-danger">*</span></label>
                        <input type="tel" name="phone" id="id_phone" class="form-control" 
                               placeholder="+7 (999) 123-45-67" required autofocus>
                        <small class="text-muted">Введите номер в формате +7XXXXXXXXXX</small>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_first_name" class="form-label">Имя</label>
                        <input type="text" name="first_name" id="id_first_name" class="form-control" 
                               placeholder="Ваше имя">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_last_name" class="form-label">Фамилия</label>
                        <input type="text" name="last_name" id="id_last_name" class="form-control" 
                               placeholder="Ваша фамилия">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль <span class="text-danger">*</span></label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_confirm_password" class="form-label">Подтверждение пароля <span class="text-danger">*</span></label>
                        <input type="password" name="confirm_password" id="id_confirm_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-pink w-100">Продолжить</button>
                </form>
                
                <div class="mt-3 text-center">
                    <p class="mb-0">Уже есть аккаунт? <a href="{% url 'login' %}" style="color: #ff85b3;">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

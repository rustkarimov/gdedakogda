{% if days_off %}
    <div class="table-responsive">
        <table class="table">
            <thead>
                <tr><th>Дата</th><th>День недели</th><th>Причина</th><th>Действия</th></tr>
            </thead>
            <tbody>
                {% for day in days_off %}
                <tr>
                    <td>{{ day.date|date:"d.m.Y" }}</td>
                    <td>{{ day.date|date:"l" }}</td>
                    <td>{{ day.reason|default:"-" }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDayOff({{ day.id }})">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <p class="text-muted mb-0">Нет предстоящих выходных</p>
{% endif %}

{% extends 'masters/base.html' %}

{% block title %}Добавить рабочий день{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle me-2" style="color: #ff85b3;"></i>Добавить рабочий день</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="day_of_week" class="form-label">День недели</label>
                        <select class="form-select" id="day_of_week" name="day_of_week" required>
                            <option value="">Выберите день</option>
                            <option value="0">Понедельник</option>
                            <option value="1">Вторник</option>
                            <option value="2">Среда</option>
                            <option value="3">Четверг</option>
                            <option value="4">Пятница</option>
                            <option value="5">Суббота</option>
                            <option value="6">Воскресенье</option>
                        </select>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="start_time" class="form-label">Начало работы</label>
                            <input type="time" class="form-control" id="start_time" name="start_time" value="09:00" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="end_time" class="form-label">Конец работы</label>
                            <input type="time" class="form-control" id="end_time" name="end_time" value="18:00" required>
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-pink">Сохранить</button>
                        <a href="{% url 'schedule' %}" class="btn btn-outline-pink ms-2">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% for service in services %}
<div class="col-md-6 col-lg-4 mb-3">
    <div class="service-card h-100">
        <div class="service-name">{{ service.name }}</div>
        {% if service.description %}
            <div class="service-description">{{ service.description|truncatechars:80 }}</div>
        {% endif %}
        <div class="service-meta">
            <span class="duration">
                <i class="far fa-clock me-1"></i>{{ service.duration }} мин
            </span>
            <span class="price">{{ service.price }} ₽</span>
        </div>
        <div class="service-actions">
            <button class="btn btn-edit" onclick="editService({{ service.id }})">
                <i class="fas fa-edit me-1"></i>Изменить
            </button>
            <button class="btn btn-delete" onclick="deleteService({{ service.id }}, '{{ service.name|escapejs }}')">
                <i class="fas fa-trash me-1"></i>Удалить
            </button>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12">
    <div class="empty-state">
        <i class="fas fa-cut"></i>
        <h5>У вас пока нет услуг</h5>
        <p class="text-muted">Добавьте первую услугу, чтобы клиенты могли записаться</p>
        <button class="btn btn-pink mt-2" data-bs-toggle="modal" data-bs-target="#serviceModal" onclick="openAddServiceModal()">
            <i class="fas fa-plus me-1"></i>Добавить услугу
        </button>
    </div>
</div>
{% endfor %}
